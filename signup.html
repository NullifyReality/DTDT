<!DOCTYPE html>
<html data-bs-theme="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Signup - Do They Drug Test?</title>
    <link rel="icon" type="image/png" href="assets/img/tubeular.png">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-md fixed-top mb-0 pb-0" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.html">Do They Drug Test?</a>
            <div class="ms-auto">
                <a class="nav-link d-inline-block text-light" href="login.html">Login</a>
                <a class="nav-link d-inline-block text-light" href="search.html">Search</a>
            </div>
        </div>
    </nav>

    <section class="position-relative py-5" style="min-height: 100vh; background: url('assets/img/treez.jpg') center / cover;">
        <div class="container py-5">
            <div class="row justify-content-center pt-5 g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-body p-4 p-sm-5">
                            <h1 class="h3 text-center mb-4 text-dark">Create Account</h1>
                            <form id="signupForm">
                                <div class="alert form-message" style="display: none;"></div>
                                <div class="mb-3">
                                    <label class="form-label" for="signupDisplayName">Display name</label>
                                    <input class="form-control" id="signupDisplayName" type="text" name="displayName" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="signupEmail">Email</label>
                                    <input class="form-control" id="signupEmail" type="email" name="email" autocomplete="email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="signupPassword">Password</label>
                                    <input class="form-control" id="signupPassword" type="password" name="password" autocomplete="new-password" minlength="12" required>
                                </div>
                                <button class="btn btn-primary w-100" type="submit">Signup</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-body p-4 p-sm-5">
                            <h2 class="h4 text-center mb-4 text-dark">Verify Email</h2>
                            <form id="verifyForm">
                                <div class="alert form-message" style="display: none;"></div>
                                <div class="mb-3">
                                    <label class="form-label" for="verifyEmail">Email</label>
                                    <input class="form-control" id="verifyEmail" type="email" name="email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="verifyCode">Verification code</label>
                                    <input class="form-control" id="verifyCode" type="text" name="code" inputmode="numeric" required>
                                </div>
                                <button class="btn btn-success w-100" type="submit">Verify</button>
                                <button class="btn btn-outline-primary w-100 mt-2" id="resendVerification" type="button">Resend code</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/script.min.js"></script>
    <script src="assets/js/dtdt-api.js?v=20260611-auth-nav1"></script>
    <script src="assets/js/dtdt-auth.js?v=20260611-signup1"></script>
</body>
</html>
