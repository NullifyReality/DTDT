<!DOCTYPE html>
<html data-bs-theme="light" lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2790699901602858" crossorigin="anonymous"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Reset Password - Do They Drug Test?</title>
    <link rel="icon" type="image/png" href="assets/img/tubeular.png">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-md fixed-top mb-0 pb-0" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.html">Do They Drug Test?</a>
            <div class="ms-auto">
                <a class="nav-link d-inline-block text-light" href="login.html">Login</a>
                <a class="nav-link d-inline-block text-light" href="search.html">Search</a>
            </div>
        </div>
    </nav>

    <section class="position-relative py-5" style="min-height: 100vh; background: url('assets/img/mounts.jpg') center / cover;">
        <div class="container py-5">
            <div class="row justify-content-center pt-5 g-4">
                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-body p-4 p-sm-5">
                            <h1 class="h3 text-center mb-4 text-dark">Request Reset</h1>
                            <form id="forgotForm">
                                <div class="alert form-message" style="display: none;"></div>
                                <div class="mb-3">
                                    <label class="form-label" for="forgotEmail">Email</label>
                                    <input class="form-control" id="forgotEmail" type="email" name="email" required>
                                </div>
                                <button class="btn btn-primary w-100" type="submit">Send Code</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card">
                        <div class="card-body p-4 p-sm-5">
                            <h2 class="h4 text-center mb-4 text-dark">Set New Password</h2>
                            <form id="resetForm">
                                <div class="alert form-message" style="display: none;"></div>
                                <div class="mb-3">
                                    <label class="form-label" for="resetEmail">Email</label>
                                    <input class="form-control" id="resetEmail" type="email" name="email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="resetCode">Verification code</label>
                                    <input class="form-control" id="resetCode" type="text" name="code" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="resetToken">Reset token</label>
                                    <input class="form-control" id="resetToken" type="text" name="resetToken" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="resetPassword">New password</label>
                                    <input class="form-control" id="resetPassword" type="password" name="password" minlength="12" required>
                                </div>
                                <button class="btn btn-success w-100" type="submit">Reset Password</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/script.min.js"></script>
    <script src="assets/js/dtdt-api.js?v=20260611-auth-nav1"></script>
    <script src="assets/js/dtdt-auth.js?v=20260611-guard2"></script>
</body>
</html>
