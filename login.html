<!DOCTYPE html>
<html data-bs-theme="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Login - Do They Drug Test?</title>
    <link rel="icon" type="image/png" href="assets/img/tubeular.png">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-md fixed-top mb-0 pb-0" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.html">Do They Drug Test?</a>
            <div class="ms-auto">
                <a class="nav-link d-inline-block text-light" href="signup.html">Create Account</a>
                <a class="nav-link d-inline-block text-light" href="search.html">Search</a>
            </div>
        </div>
    </nav>

    <section class="position-relative py-5" style="min-height: 100vh; background: url('assets/img/galaxy.jpg') center / cover;">
        <div class="container py-5">
            <div class="row justify-content-center pt-5">
                <div class="col-md-7 col-lg-5">
                    <div class="card">
                        <div class="card-body p-4 p-sm-5">
                            <h1 class="h3 text-center mb-4 text-dark">Login</h1>
                            <form id="loginForm">
                                <div class="alert form-message" style="display: none;"></div>
                                <div class="mb-3">
                                    <label class="form-label" for="loginEmail">Email</label>
                                    <input class="form-control" id="loginEmail" type="email" name="email" autocomplete="email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="loginPassword">Password</label>
                                    <input class="form-control" id="loginPassword" type="password" name="password" autocomplete="current-password" required>
                                </div>
                                <button class="btn btn-primary w-100" type="submit">Login</button>
                            </form>
                            <div class="text-center mt-3">
                                <a href="signup.html">Create an account</a>
                                <span class="mx-2">|</span>
                                <a href="reset.html">Reset password</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/script.min.js"></script>
    <script src="assets/js/dtdt-api.js"></script>
    <script src="assets/js/dtdt-auth.js"></script>
</body>
</html>
