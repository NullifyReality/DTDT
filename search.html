    <style>
        .queue-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            color: #fff;
            margin-bottom: 18px;
            padding: 12px 14px;
            text-align: left;
        }
        .queue-state {
            color: rgb(101, 225, 173);
            font-weight: 700;
            text-transform: uppercase;
        }
        .loading-spinner {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .results-info {
            margin: 15px 0;
            padding: 10px;
            background: #fff;
            border: 1px solid rgba(101, 225, 173, 0.45);
            border-radius: 5px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.24);
            color: #172126;
            font-weight: 700;
            line-height: 1.35;
            text-align: left;
        }
        .results-info #resultsCount,
        .results-info #pageInfo {
            color: #005f5f;
        }
        @media (max-width: 575.98px) {
            .results-info #pageInfo {
                display: block;
                float: none !important;
                margin-top: 4px;
            }
        }
        .company-result {
            text-align: left;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .company-title {
            color: #005f5f;
            font-size: 1.05rem;
            font-weight: 700;
            text-decoration: none;
        }
        .company-title:hover {
            text-decoration: underline;
        }
        .company-meta {
            color: #5c636a;
            font-size: 0.86rem;
            margin: 10px 0 0;
        }
        .policy-badges .badge {
            margin-bottom: 6px;
        }
        .page-btn {
            margin: 0 5px;
            padding: 5px 15px;
        }
    </style>
</head>

    <section class="text-center content-section" id="search" style="background: #080808; min-height: calc(100vh - 121px); padding: 100px 0px 20px;">
        <div class="container">
            <div class="alert alert-info beautiful" role="alert" id="api-status">
                <strong>Live Search Active!</strong> Database updates are moderated before becoming public.
            </div>

            <section class="mt-4 pt-0 py-5">
                <div class="row">
                    <div class="col-md-8 offset-md-2">
                        <input class="form-control-lg mb-3 w-100" type="search" id="Search-Bar-1" placeholder="Search company names, industries, or locations..." autofocus style="background: rgba(163,163,163,0.96); border-radius: 14px; border: 3px solid var(--bs-black); text-align: center;">

                        <div class="d-flex justify-content-center mb-4">
                            <button class="btn btn-primary me-2" id="open-filters" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvas-menu" style="border-radius: 4px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-funnel" viewBox="0 0 16 16">
                                    <path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5v-2zm1 .5v1.308l4.372 4.858A.5.5 0 0 1 7 8.5v5.306l2-.666V8.5a.5.5 0 0 1 .128-.334L13.5 3.308V2h-11z"/>
                                </svg>
                                Filters
                            </button>
                            <button class="btn btn-success ms-2" id="StartSearch" type="button" style="font-size: 18px; border-radius: 4px;">Search</button>
                        </div>

                        <div class="queue-card" aria-live="polite">
                            <div class="queue-state" id="queueState">Queued</div>
                            <div id="queueDetail">Preparing search.</div>
                        </div>

                        <div class="loading-spinner" id="loadingSpinner"></div>

                        <div class="results-info" id="resultsInfo" style="display: none;">
                            Found <span id="resultsCount">0</span> reports
                            <span id="pageInfo" class="float-end">Page 1</span>
                        </div>

                        <div id="resultsContainer" class="list-group"></div>

                        <div class="mt-4" id="pagination" style="display: none;">
                            <button class="btn btn-outline-primary page-btn" id="prevPage" disabled>Previous</button>
                            <span class="mx-3 text-light">Page <span id="currentPage">1</span></span>
                            <button class="btn btn-outline-primary page-btn" id="nextPage" disabled>Next</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="mb-3">
                <label class="form-label"><strong>Company name or industry</strong></label>
                <input class="form-control" id="industryFilter" type="text" placeholder="Industry">
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Report state</strong></label>

                    <option value="MT">Montana</option>
                    <option value="NE">Nebraska</option>
                    <option value="NC">North Carolina</option>
                    <option value="NV">Nevada</option>
                    <option value="NH">New Hampshire</option>
                    <option value="NJ">New Jersey</option>
                    <option value="NM">New Mexico</option>
                    <option value="NY">New York</option>
                    <option value="ND">North Dakota</option>
                    <option value="OH">Ohio</option>
                    <option value="OK">Oklahoma</option>
                    <option value="OR">Oregon</option>
                    <option value="PA">Pennsylvania</option>
                    <option value="RI">Rhode Island</option>
                    <option value="SC">South Carolina</option>
                    <option value="SD">South Dakota</option>
                    <option value="TN">Tennessee</option>
                    <option value="TX">Texas</option>
                    <option value="UT">Utah</option>
                    <option value="VT">Vermont</option>
                    <option value="VA">Virginia</option>
                    <option value="WA">Washington</option>
                    <option value="WV">West Virginia</option>
                    <option value="WI">Wisconsin</option>
                    <option value="WY">Wyoming</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Pre-employment testing</strong></label>
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="preEmploymentTesting" id="pre_any" value="any" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="pre_any">Any</label>
                    <input type="radio" class="btn-check" name="preEmploymentTesting" id="pre_no" value="NO" autocomplete="off">
                    <label class="btn btn-outline-primary" for="pre_no">No</label>
                    <input type="radio" class="btn-check" name="preEmploymentTesting" id="pre_yes" value="YES" autocomplete="off">
                    <label class="btn btn-outline-primary" for="pre_yes">Yes</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Random testing</strong></label>
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="randomTesting" id="random_any" value="any" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="random_any">Any</label>
                    <input type="radio" class="btn-check" name="randomTesting" id="random_no" value="NO" autocomplete="off">
                    <label class="btn btn-outline-primary" for="random_no">No</label>
                    <input type="radio" class="btn-check" name="randomTesting" id="random_yes" value="YES" autocomplete="off">
                    <label class="btn btn-outline-primary" for="random_yes">Yes</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Post-accident testing</strong></label>
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="postAccidentTesting" id="post_any" value="any" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="post_any">Any</label>
                    <input type="radio" class="btn-check" name="postAccidentTesting" id="post_no" value="NO" autocomplete="off">
                    <label class="btn btn-outline-primary" for="post_no">No</label>
                    <input type="radio" class="btn-check" name="postAccidentTesting" id="post_yes" value="YES" autocomplete="off">
                    <label class="btn btn-outline-primary" for="post_yes">Yes</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Reasonable suspicion testing</strong></label>
                <div class="btn-group w-100" role="group">
                    <input type="radio" class="btn-check" name="reasonableSuspicionTesting" id="suspicion_any" value="any" autocomplete="off" checked>
                    <label class="btn btn-outline-primary" for="suspicion_any">Any</label>
                    <input type="radio" class="btn-check" name="reasonableSuspicionTesting" id="suspicion_no" value="NO" autocomplete="off">
                    <label class="btn btn-outline-primary" for="suspicion_no">No</label>
                    <input type="radio" class="btn-check" name="reasonableSuspicionTesting" id="suspicion_yes" value="YES" autocomplete="off">
                    <label class="btn btn-outline-primary" for="suspicion_yes">Yes</label>
                </div>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="thcFriendly">
                <label class="form-check-label" for="thcFriendly">THC friendly policy</label>
            </div>

            <div class="mb-3">
                <label class="form-label"><strong>Remote worker policy</strong></label>
                <input class="form-control" id="remotePolicyFilter" type="text" placeholder="Remote, hybrid, unknown">
            </div>

            <div class="mt-4">
                <button class="btn btn-primary w-100 mb-2" onclick="applyFilters()">Apply Filters</button>
                <button class="btn btn-outline-secondary w-100" onclick="resetFilters()">Reset Filters</button>
            </div>
        </div>
    </div>
