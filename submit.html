<!DOCTYPE html>
<html data-bs-theme="light" lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2790699901602858" crossorigin="anonymous"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <title>Submit Info - Do They Drug Test?</title>
    <link rel="icon" type="image/png" href="assets/img/tubeular.png">
    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-md fixed-top mb-0 pb-0" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="index.html">Do They Drug Test?</a>
            <div class="ms-auto">
                <a class="nav-link d-inline-block text-light" href="search.html">Search</a>
                <a class="nav-link d-inline-block text-light" href="login.html">Login</a>
            </div>
        </div>
    </nav>

    <section class="position-relative py-5" style="min-height: 100vh; background: #080808;">
        <div class="container py-5">
            <div class="row justify-content-center pt-5">
                <div class="col-lg-8">
                    <div class="card">
                        <div class="card-body p-4 p-sm-5">
                            <h1 class="h3 text-center mb-4 text-dark">Submit company information</h1>
                            <form id="submissionForm" style="display: none;">
                                <div class="alert form-message" style="display: none;"></div>
                                <div class="alert alert-info" role="alert">
                                    Submit a separate report for each work location. Use the state where the policy applies, not the company's headquarters; the same company name can appear in multiple locations.
                                </div>

                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <label class="form-label" for="submissionType">Submission type</label>
                                        <select class="form-select" id="submissionType" name="type">
                                            <option value="COMPANY">New location report</option>
                                            <option value="POLICY_UPDATE">Policy update</option>
                                            <option value="CORRECTION">Correction</option>
                                            <option value="EXPERIENCE">Experience</option>
                                        </select>
                                    </div>
                                </div>

                                <hr>

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label" for="companyName">Company name</label>
                                        <input class="form-control" id="companyName" name="name" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="companyWebsite">Website</label>
                                        <input class="form-control" id="companyWebsite" name="website" type="url">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="industry">Industry</label>
                                        <input class="form-control" id="industry" name="industry">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="headquarters">Report location</label>
                                        <input class="form-control" id="headquarters" name="headquarters" placeholder="City, branch, facility, or remote team">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="state">Report state</label>
                                        <select class="form-select ui search dropdown" id="state" name="state">
                                            <option value="">State</option>
                                            <option value="AL">Alabama</option>
                                            <option value="AK">Alaska</option>
                                            <option value="AZ">Arizona</option>
                                            <option value="AR">Arkansas</option>
                                            <option value="CA">California</option>
                                            <option value="CO">Colorado</option>
                                            <option value="CT">Connecticut</option>
                                            <option value="DE">Delaware</option>
                                            <option value="DC">District of Columbia</option>
                                            <option value="FL">Florida</option>
                                            <option value="GA">Georgia</option>
                                            <option value="HI">Hawaii</option>
                                            <option value="ID">Idaho</option>
                                            <option value="IL">Illinois</option>
                                            <option value="IN">Indiana</option>
                                            <option value="IA">Iowa</option>
                                            <option value="KS">Kansas</option>
                                            <option value="KY">Kentucky</option>
                                            <option value="LA">Louisiana</option>
                                            <option value="ME">Maine</option>
                                            <option value="MD">Maryland</option>
                                            <option value="MA">Massachusetts</option>
                                            <option value="MI">Michigan</option>
                                            <option value="MN">Minnesota</option>
                                            <option value="MS">Mississippi</option>
                                            <option value="MO">Missouri</option>
                                            <option value="MT">Montana</option>
                                            <option value="NE">Nebraska</option>
                                            <option value="NV">Nevada</option>
                                            <option value="NH">New Hampshire</option>
                                            <option value="NJ">New Jersey</option>
                                            <option value="NM">New Mexico</option>
                                            <option value="NY">New York</option>
                                            <option value="NC">North Carolina</option>
                                            <option value="ND">North Dakota</option>
                                            <option value="OH">Ohio</option>
                                            <option value="OK">Oklahoma</option>
                                            <option value="OR">Oregon</option>
                                            <option value="PA">Pennsylvania</option>
                                            <option value="RI">Rhode Island</option>
                                            <option value="SC">South Carolina</option>
                                            <option value="SD">South Dakota</option>
                                            <option value="TN">Tennessee</option>
                                            <option value="TX">Texas</option>
                                            <option value="UT">Utah</option>
                                            <option value="VT">Vermont</option>
                                            <option value="VA">Virginia</option>
                                            <option value="WA">Washington</option>
                                            <option value="WV">West Virginia</option>
                                            <option value="WI">Wisconsin</option>
                                            <option value="WY">Wyoming</option>
                                        </select>
                                        <div class="form-text">Use the state this report applies to.</div>
                                    </div>
                                </div>

                                <div class="row g-3 mt-2">
                                    <div class="col-md-6">
                                        <label class="form-label" for="preEmploymentTesting">Pre-employment testing</label>
                                        <select class="form-select" id="preEmploymentTesting" name="preEmploymentTesting">
                                            <option value="UNKNOWN">Unknown</option>
                                            <option value="NO">No</option>
                                            <option value="YES">Yes</option>
                                            <option value="SOMETIMES">Sometimes</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="randomTesting">Random testing</label>
                                        <select class="form-select" id="randomTesting" name="randomTesting">
                                            <option value="UNKNOWN">Unknown</option>
                                            <option value="NO">No</option>
                                            <option value="YES">Yes</option>
                                            <option value="SOMETIMES">Sometimes</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="postAccidentTesting">Post-accident testing</label>
                                        <select class="form-select" id="postAccidentTesting" name="postAccidentTesting">
                                            <option value="UNKNOWN">Unknown</option>
                                            <option value="NO">No</option>
                                            <option value="YES">Yes</option>
                                            <option value="SOMETIMES">Sometimes</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="reasonableSuspicionTesting">Reasonable suspicion testing</label>
                                        <select class="form-select" id="reasonableSuspicionTesting" name="reasonableSuspicionTesting">
                                            <option value="UNKNOWN">Unknown</option>
                                            <option value="NO">No</option>
                                            <option value="YES">Yes</option>
                                            <option value="SOMETIMES">Sometimes</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mt-3">
                                    <label class="form-label" for="thcPolicy">THC policy</label>
                                    <textarea class="form-control" id="thcPolicy" name="thcPolicy" rows="3"></textarea>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label" for="remoteWorkerPolicy">Remote worker policy</label>
                                    <textarea class="form-control" id="remoteWorkerPolicy" name="remoteWorkerPolicy" rows="3"></textarea>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label" for="additionalNotes">Additional notes</label>
                                    <textarea class="form-control" id="additionalNotes" name="additionalNotes" rows="4"></textarea>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label" for="experience">Experience or source note</label>
                                    <textarea class="form-control" id="experience" name="experience" rows="4"></textarea>
                                </div>
                                <div class="mt-3">
                                    <label class="form-label" for="moderationNote">Message to moderators</label>
                                    <textarea class="form-control" id="moderationNote" name="note" rows="3"></textarea>
                                </div>

                                <button class="btn btn-primary w-100 mt-4" type="submit">Send to Moderation</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/bootstrap/js/bootstrap.min.js"></script>
    <script src="assets/js/script.min.js"></script>
    <script src="assets/js/dtdt-api.js?v=20260611-auth-nav1"></script>
    <script src="assets/js/dtdt-submit.js?v=20260615-location2"></script>
</body>
</html>
